  <body data-design-system="bsl-002">
    <div id="root"></div>
    <!--
      Telegram Login Widget redirect flow: when the user authorizes, Telegram
      redirects back to this page with the auth payload in the URL hash. The
      widget script reads the hash on load and calls window.__bsl_tg_login(user).
      This inline script must run BEFORE the widget script (which is async) so
      the callback is already defined when the widget fires it.
    -->
    <script>
      window.__bsl_tg_login = function(user) {
        // T026: only stash the payload when it has the minimum Telegram
        // Login Widget shape. This defends against partial loads,
        // URL-hash fragments that aren't real payloads, and React
        // Strict-Mode's double-mount (which would otherwise re-fire
        // handlePayload and double-submit the auth).
        if (
          user &&
          typeof user === 'object' &&
          typeof user.id === 'number' &&
          typeof user.first_name === 'string' &&
          typeof user.auth_date === 'number' &&
          typeof user.hash === 'string' &&
          /^[a-f0-9]{64}$/i.test(user.hash)
        ) {
          window.__bsl_tg_pending = user;
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
