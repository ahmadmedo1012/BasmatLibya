services:
  - type: web
    name: basmatlibya
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/healthz
    preDeployCommand: pnpm --filter @basmat/server db:migrate
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SOURCE_PROVIDERS
        value: live
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: 10
      - key: RATE_LIMIT_MAX_PER_WINDOW
        value: 5
      - key: RETENTION_DAYS
        value: 30
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MODEL_SECRET_KEY
        sync: false
      - key: ENRICHMENT_ENABLED
        value: true
      - key: NVIDIA_API_KEY
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: NUMVERIFY_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: OWNER_TELEGRAM_ID
        sync: false
      - key: MODEL_SECRET_KEY_PREVIOUS
        sync: false
