services:
  # Single deploy target — no other deploy surface exists for the main branch.
  # See spec 005-audit-repair-core (T004) for the verification recipe.
  # T028: PUBLIC_BASE_URL is the value Express's CORS middleware uses as
  # the allowed origin. It MUST match the public origin Render serves
  # traffic on, otherwise cross-site requests will be silently rejected
  # and the Telegram Login Widget's redirect-mode sign-in will fail with
  # a CORS error. The Render dashboard confirms this is the service's
  # primary URL; change both this env var and the dashboard's custom
  # domain setting in lockstep.
  - type: web
    name: basmatlibya
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/healthz
    preDeployCommand: pnpm --filter @basmat/server db:migrate
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SOURCE_PROVIDERS
        value: mock
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://basmatly.onrender.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: MODEL_SECRET_KEY
        sync: false
      - key: ENRICHMENT_ENABLED
        value: false
      - key: RATE_LIMIT_MAX_PER_WINDOW
        value: 50
