services:
  db:
    image: postgres:16-alpine
    container_name: basmat_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: basmat
      POSTGRES_PASSWORD: basmat
      POSTGRES_DB: basmat
    ports:
      - "5434:5432"
    volumes:
      - basmat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basmat -d basmat"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: basmat_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    profiles:
      - tools

  phoneinfoga:
    image: sundowndev/phoneinfoga:latest
    container_name: basmat_phoneinfoga
    restart: unless-stopped
    profiles:
      - tools
    command: ["serve", "-p", "5000"]
    ports:
      - "5050:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  basmat_pg_data:
